<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bélapátfalva · Úttervező</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   TOKENS
═══════════════════════════════════════ */
:root {
  --gd:#1E4A08; --gm:#3E7A18; --gl:#EBF3E0; --gb:#C8DFB0;
  --gm2:#5A9A28;
  --amber:#7A5000; --al:#FFF8E8;
  --ink:#1A1916; --muted:#6A6864; --border:#DDD9D0;
  --cream:#FAF8F4; --white:#fff; --meal:#F4F9EF;
  --easy-bg:#DFF0CC; --easy:#2E6010;
  --mid-bg:#FFF3CC;  --mid:#7A5000;
  --hard-bg:#FAECE7; --hard:#8B2B10;
  --drop-glow: 0 0 0 2px var(--gm), 0 4px 24px rgba(62,122,24,.25);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);font-size:17px;color:var(--ink);background:var(--cream);display:flex;flex-direction:column;}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar{
  flex-shrink:0;
  background:var(--gd);
  padding:0 24px;
  height:62px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  box-shadow:0 2px 16px rgba(0,0,0,.3);
  z-index:300;
}
.topbar-left{display:flex;align-items:center;gap:14px;}
.logo{font-family:var(--serif);font-size:28px;color:#fff;font-weight:400;line-height:1;}
.logo em{font-style:italic;color:#B8D89A;}
.topbar-badge{font-size:13px;color:rgba(255,255,255,.45);letter-spacing:.1em;text-transform:uppercase;border-left:1px solid rgba(255,255,255,.2);padding-left:14px;}
.topbar-right{display:flex;gap:8px;align-items:center;}
.tbtn{display:inline-flex;align-items:center;gap:5px;font-size:15px;font-weight:500;padding:7px 14px;border-radius:20px;cursor:pointer;border:none;font-family:var(--sans);transition:all .15s;}
.tbtn-ghost{background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.2);}
.tbtn-ghost:hover{background:rgba(255,255,255,.2);}
.tbtn-green{background:var(--gb);color:var(--gd);}
.tbtn-green:hover{background:#b0d490;}
.counter{font-size:14px;color:rgba(255,255,255,.5);background:rgba(255,255,255,.1);padding:4px 10px;border-radius:20px;}

/* ═══════════════════════════════════════
   MAIN LAYOUT
═══════════════════════════════════════ */
.app{flex:1;display:grid;grid-template-columns:380px 1fr;overflow:hidden;}

/* ═══════════════════════════════════════
   LIBRARY (LEFT)
═══════════════════════════════════════ */
.library{
  background:var(--white);
  border-right:1.5px solid var(--border);
  display:flex;flex-direction:column;
  overflow:hidden;
}
.lib-head{
  background:var(--gl);
  border-bottom:1px solid var(--gb);
  padding:18px 20px 14px;
  flex-shrink:0;
}
.lib-head h2{font-family:var(--serif);font-size:30px;font-weight:600;color:var(--gd);margin-bottom:2px;}
.lib-head p{font-size:18px;color:var(--muted);margin-top:4px;}
.lib-tabs{display:flex;flex-shrink:0;border-bottom:1.5px solid var(--border);}
.ltab{flex:1;font-size:13px;font-weight:500;padding:9px 4px;text-align:center;cursor:pointer;background:none;border:none;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;color:var(--muted);font-family:var(--sans);transition:color .15s;}
.ltab.on{color:var(--gd);border-bottom-color:var(--gm);}
.lib-scroll{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:20px;}
.lib-scroll::-webkit-scrollbar{width:6px;}
.lib-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ─ lib card ─ */
.lcard{
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:10px;
  overflow:visible;
  height:auto;
  cursor:grab;
  user-select:none;
  transition:border-color .15s, box-shadow .15s, transform .15s;
  position:relative;
}
.lcard:hover{border-color:var(--gb);box-shadow:0 3px 12px rgba(0,0,0,.09);}
.lcard.is-dragging{transform:rotate(2deg) scale(1.03);box-shadow:0 10px 32px rgba(30,74,8,.22);opacity:.85;z-index:999;}
.lcard-body{padding:12px 14px;}
.lcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;margin-bottom:8px;}
.lcard-name{font-weight:600;font-size:17px;color:var(--gd);line-height:1.25;}
.lcard-type{font-size:15px;color:var(--muted);font-style:italic;margin-top:1px;}
.dpill{font-size:14px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;flex-shrink:0;letter-spacing:.02em;}
.dp-k{background:var(--easy-bg);color:var(--easy);}
.dp-koz{background:var(--mid-bg);color:var(--mid);}
.dp-n{background:var(--hard-bg);color:var(--hard);}
.drag-tip{font-size:14px;color:var(--gb);margin-top:8px;display:flex;align-items:center;gap:3px;}
.lcard-img{width:100%;height:240px;object-fit:cover;display:block;background:var(--gl);}
.lcard-img-ph{width:100%;height:180px;background:linear-gradient(135deg,var(--gl),#d0e8c0);display:flex;align-items:center;justify-content:center;font-size:66px;}
.lcard-stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.lcsg-item{background:var(--gl);border-radius:6px;padding:7px 4px;text-align:center;}
.lcsg-val{font-family:var(--serif);font-size:20px;font-weight:600;color:var(--gd);line-height:1;}
.lcsg-key{font-size:12px;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.lcard-divider{height:1px;background:var(--border);margin:8px 0;}
.lcard-detail-row{display:flex;gap:6px;margin-bottom:5px;align-items:flex-start;}
.ldd-label{font-size:13px;color:var(--muted);min-width:88px;flex-shrink:0;padding-top:1px;}
.ldd-val{font-size:15px;color:var(--ink);line-height:1.4;flex:1;}
.ldd-dist{color:var(--gm);font-weight:600;}
.ldd-note{color:var(--muted);font-style:italic;}
.sight-chips{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.sight-chip{font-size:12px;background:var(--cream);color:var(--muted);border:1px solid var(--border);padding:2px 7px;border-radius:4px;}
/* eat lcard */
.lcard.eat{border-left:3px solid var(--gm);}
.eat-rat{font-size:15px;color:var(--gm);font-weight:600;}
/* other lcard */
.lcard.other{padding:10px 12px;}

/* ═══════════════════════════════════════
   PLANNER (RIGHT)
═══════════════════════════════════════ */
.planner{
  display:flex;flex-direction:column;
  overflow:hidden;
}
.plan-toolbar{
  flex-shrink:0;
  background:var(--white);
  border-bottom:1.5px solid var(--border);
  padding:10px 20px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.plan-toolbar-title{font-family:var(--serif);font-size:21px;color:var(--gd);flex:1;}
.plan-days-scroll{flex:1;overflow:auto;padding:20px;}
.plan-days-scroll::-webkit-scrollbar{height:6px;width:6px;}
.plan-days-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.days-row{display:flex;gap:16px;min-height:100%;align-items:flex-start;}

/* ─ day column ─ */
.day-col{
  min-width:260px;
  flex:1;
  background:var(--white);
  border:1.5px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  display:flex;flex-direction:column;
  transition:border-color .15s;
}
.day-col.accepting{border-color:var(--gm);}
.day-head{
  background:var(--gl);
  border-bottom:1px solid var(--gb);
  padding:12px 14px;
  flex-shrink:0;
}
.day-head-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.day-n{font-size:14px;font-weight:700;color:var(--gm);letter-spacing:.1em;text-transform:uppercase;}
.day-title-input{
  font-family:var(--serif);font-size:22px;font-weight:400;color:var(--gd);
  border:none;background:transparent;outline:none;width:100%;
  border-bottom:1.5px solid transparent;transition:border-color .15s;
}
.day-title-input:focus{border-bottom-color:var(--gm);}
.day-stats-row{display:flex;gap:12px;flex-wrap:wrap;}
.dstat{font-size:15px;color:var(--muted);}
.dstat strong{color:var(--gd);}

/* ─ drop zone ─ */
.dropzone{
  flex:1;
  min-height:120px;
  padding:10px;
  display:flex;flex-direction:column;gap:8px;
  transition:background .2s;
  position:relative;
}
.dropzone.over{
  background:rgba(62,122,24,.06);
}
.dropzone.over::after{
  content:'';position:absolute;inset:6px;
  border:2px dashed var(--gm);border-radius:8px;pointer-events:none;
  animation:pulse-border .8s ease-in-out infinite alternate;
}
@keyframes pulse-border{from{opacity:.5}to{opacity:1}}
.dropzone-empty{
  display:flex;align-items:center;justify-content:center;
  flex:1;min-height:80px;
  font-size:15px;color:var(--border);font-style:italic;text-align:center;
  pointer-events:none;
}
.day-foot{
  border-top:1px solid var(--border);
  background:#FAFAF7;
  padding:8px 14px;
  display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  flex-shrink:0;
}
.foot-stat{font-size:15px;color:var(--muted);}
.foot-stat strong{color:var(--gd);font-size:16px;}
.arr-time{font-size:15px;font-weight:600;color:var(--gm);background:var(--gl);padding:3px 10px;border-radius:12px;border:1px solid var(--gb);}

/* ─ placed card ─ */
.pcard{
  background:var(--cream);
  border:1.5px solid var(--border);
  border-radius:8px;
  padding:9px 10px;
  display:flex;align-items:flex-start;gap:8px;
  cursor:grab;user-select:none;
  transition:box-shadow .15s,transform .15s,border-color .15s;
  animation:drop-in .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes drop-in{
  from{opacity:0;transform:translateY(-10px) scale(.96);}
  to{opacity:1;transform:none;}
}
.pcard:hover{border-color:var(--gb);box-shadow:0 2px 8px rgba(0,0,0,.08);}
.pcard.is-dragging{opacity:.4;transform:scale(.97);}
.pcard.eat-p{border-left:3px solid var(--gm);background:var(--meal);}
.pcard.auto-p{border:1.5px dashed var(--gb);background:var(--gl);cursor:default;opacity:.8;}
.pcard.suggest-p{border:1.5px dashed #C8900A;background:#FFFBF0;cursor:default;}
.suggest-label{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#C8900A;margin-bottom:3px;}
.suggest-note{font-size:12px;color:#8A6A50;font-style:italic;margin-top:3px;}
.pc-icon{font-size:22px;flex-shrink:0;margin-top:1px;}
.pc-body{flex:1;min-width:0;}
.pc-name{font-size:17px;font-weight:500;color:var(--gd);line-height:1.2;margin-bottom:2px;}
.pc-meta{font-size:15px;color:var(--muted);line-height:1.4;}
.pc-tag{display:inline-block;font-size:14px;padding:1px 7px;border-radius:10px;margin-top:3px;font-weight:500;}
.pct-t{background:var(--easy-bg);color:var(--easy);}
.pct-e{background:#F0EDE6;color:#5A5650;}
.pct-o{background:#D8EAF8;color:#0C3E72;}
.pc-x{background:none;border:none;color:var(--border);font-size:18px;cursor:pointer;padding:2px 3px;border-radius:4px;flex-shrink:0;line-height:1;transition:color .15s;}
.pc-x:hover{color:#c0392b;}



/* ═══════════════════════════════════════
   EXPORT MODAL
═══════════════════════════════════════ */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:14px;padding:30px 28px;max-width:440px;width:92%;box-shadow:0 24px 70px rgba(0,0,0,.28);}
.modal h3{font-family:var(--serif);font-size:24px;color:var(--gd);margin-bottom:8px;}
.modal p{font-size:15px;color:var(--muted);line-height:1.7;margin-bottom:20px;}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;}
.mbtn{display:inline-flex;align-items:center;gap:5px;font-size:15px;font-weight:500;padding:9px 18px;border-radius:20px;cursor:pointer;border:none;font-family:var(--sans);}
.mbtn-cancel{background:var(--cream);color:var(--muted);border:1px solid var(--border);}
.mbtn-cancel:hover{background:var(--border);}
.mbtn-do{background:var(--gd);color:#fff;}
.mbtn-do:hover{background:#2c6010;}

/* ═══════════════════════════════════════
   CONFIRM TOAST
═══════════════════════════════════════ */
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
  background:var(--gd);color:#fff;font-size:15px;font-weight:500;
  padding:10px 22px;border-radius:24px;box-shadow:0 8px 24px rgba(0,0,0,.25);
  opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── LEGEND BAR ── */
.legend-bar{background:#FAFAF7;border-top:1px solid var(--border);padding:5px 16px;display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;}
.legend-bar-title{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.legend-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 6px;}
.legend-items{display:flex;gap:10px;flex-wrap:wrap;align-items:center;flex:1;}
.legend-item{display:flex;align-items:center;gap:7px;font-size:14px;color:var(--muted);line-height:1.3;}
.legend-item strong{font-weight:600;color:var(--ink);}
.legend-pill{font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.lb-auto{background:var(--gl);border:1.5px dashed var(--gb);color:var(--gd);}
.lb-suggest{background:#FFFBF0;border:1.5px dashed #C8900A;color:#7A5000;}
.lb-placed{background:var(--cream);border:1.5px solid var(--border);color:var(--muted);}
</style>
</head>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Bélapátfalva · <em>Úttervező</em></div>
    <div class="topbar-badge">Erdei-lak Faházikó</div>
  </div>
  <div class="topbar-right">
    <span class="counter" id="totalCounter">0 elem tervezve</span>
    <button class="tbtn tbtn-ghost" onclick="clearAll()">↺ Törlés</button>
    <button class="tbtn tbtn-green" onclick="openModal()">⬇ Program generálása</button>
  </div>
</div>

<!-- APP -->
<div class="app">

  <!-- LIBRARY -->
  <aside class="library">
    <div class="lib-head">
      <h2>Elemek</h2>
      <p>Húzd a kívánt napba ↕</p>
    </div>
    <div class="lib-tabs">
      <button class="ltab on" data-tab="tura" onclick="switchTab(this)">⛰ Túrák (9)</button>
      <button class="ltab" data-tab="eat" onclick="switchTab(this)">🍴 Éttermek (6)</button>
      <button class="ltab" data-tab="other" onclick="switchTab(this)">✦ Programok (12)</button>
    </div>
    <div class="lib-scroll" id="libScroll"></div>
  </aside>

  <!-- PLANNER -->
  <main class="planner">
    <div class="plan-toolbar">
      <span class="plan-toolbar-title">Program tervezése — 4 nap</span>
    </div>
    <div class="plan-days-scroll">
      <div class="days-row" id="daysRow"></div>
    </div>
  </main>
</div>

<!-- EXPORT MODAL -->
<div class="overlay" id="modal">
  <div class="modal">
    <h3>Program generálása</h3>
    <p>Az összeállított program letölthető HTML fájlként generálódik — kinézete megegyezik a többi Bélapátfalva programfájllal.</p>
    <div class="modal-btns">
      <button class="mbtn mbtn-cancel" onclick="closeModal()">Mégse</button>
      <button class="mbtn mbtn-do" onclick="doExport()">Letöltés →</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

}

  document.querySelectorAll('.ltab').forEach(b=>b.classList.remove('on'));

function imgFallback(img, icon){
  var ph = document.createElement('div');
  ph.className = 'lcard-img-ph';
  ph.textContent = icon;
  img.parentNode.replaceChild(ph, img);
}
// On load: if all Wikimedia images fail (CORS), show placeholder
window.addEventListener('load', function(){
  document.querySelectorAll('.lcard-img').forEach(function(img){
    if(!img.complete || img.naturalWidth===0){
      imgFallback(img, '⛰');
    }
  });
});

function calcStats(items, isArrival){
  let km=0,elev=0,routes=0,turahours=0,otherhours=0;
  items.forEach(it=>{
    if(it.type==='tura'){
      const r=ROUTES.find(x=>x.id===it.id);
      if(r){km+=r.dist;elev+=r.elev;routes++;turahours+=(r.timeH||3);}
    } else if(it.type==='other'){
      const o=OTHER.find(x=>x.id===it.id);
      if(o) otherhours+=(o.timeH||1);
    } else if(it.type==='eat'){
      const d=DINING.find(x=>x.id===it.id);
      if(d) otherhours+=(d.timeH||1.5);
    }
  });
  const totalActiveH = Math.round((turahours+otherhours)*10)/10;
  return{km:km.toFixed(1),elev,routes,eats:items.filter(i=>i.type==='eat').length,
         turahours:totalActiveH, hasItems:items.length>0};
}

function autoMealCards(items, isArrival){
  if(!items.length) return '';
  const hasTura = items.some(i=>i.type==='tura');
  const hasEat  = items.some(i=>i.type==='eat');
  const km = items.filter(i=>i.type==='tura').reduce((s,i)=>{const r=ROUTES.find(x=>x.id===i.id);return s+(r?r.dist:0);},0);
  let html='';

  // Reggeli — csak ha nem érkezési nap
  if(!isArrival){
    html+=`<div class="pcard auto-p">
      <span class="pc-icon">☕</span>
      <div class="pc-body">
        <div class="pc-name">Reggeli — faházikó konyha</div>
        <div class="pc-meta">Automatikus · 08:30</div>
      </div>
    </div>`;
  } else {
    html+=`<div class="pcard auto-p">
      <span class="pc-icon">🚗</span>
      <div class="pc-body">
        <div class="pc-name">Érkezés — becsekkolás</div>
        <div class="pc-meta">Automatikus · 14:00 után</div>
      </div>
    </div>`;
  }

  // Ebéd — only if no eat card added AND there's a tura
  if(hasTura && !hasEat){
    const ebedName = km>5 ? 'Ebéd — hátizsák-picnic' : 'Ebéd — Bélkő Étterem / Szomjas Csuka';
    const ebedNote = km>5 ? 'Hosszú túra ('+km.toFixed(1)+' km) — vigyél szendvicset' : 'Rövid túra — ebédelj helyi étteremben';
    html+=`<div class="pcard auto-p">
      <span class="pc-icon">🥪</span>
      <div class="pc-body">
        <div class="pc-name">${ebedName}</div>
        <div class="pc-meta">Automatikus · ${ebedNote}</div>
      </div>
    </div>`;
  } else if(hasTura && hasEat){
    html+=`<div class="pcard auto-p">
      <span class="pc-icon">🥪</span>
      <div class="pc-body">
        <div class="pc-name">Ebéd — hozzáadott étteremnél</div>
        <div class="pc-meta">Automatikus · az étteremkártya alapján</div>
      </div>
    </div>`;
  }

  // Vacsora javaslat — based on first tura's eat recommendations
  const turaItems = items.filter(i=>i.type==='tura');
  if(turaItems.length > 0 && !hasEat){
    const firstTura = ROUTES.find(r=>r.id===turaItems[0].id);
    if(firstTura && firstTura.eat && firstTura.eat.length>0){
      const suggestedEatId = firstTura.eat[0];
      const suggestedEat = DINING.find(d=>d.id===suggestedEatId);
      if(suggestedEat){
        html+=`<div class="pcard suggest-p">
          <span class="pc-icon">🍽️</span>
          <div class="pc-body">
            <div class="suggest-label">💡 Vacsora javaslat</div>
            <div class="pc-name">${suggestedEat.name}</div>
            <div class="pc-meta">${suggestedEat.type} · ★ ${suggestedEat.rating} · ${suggestedEat.fromFahaz}</div>
            <div class="suggest-note">${suggestedEat.spec} · ${suggestedEat.hours}</div>
          </div>
        </div>`;
      }
    }
  } else if(!hasTura && !hasEat && items.length>0){
    // No tura, no eat — suggest Bélkő as default vacsora
    const def = DINING.find(d=>d.id==='e2');
    if(def) html+=`<div class="pcard suggest-p">
      <span class="pc-icon">🍽️</span>
      <div class="pc-body">
        <div class="suggest-label">💡 Vacsora javaslat</div>
        <div class="pc-name">${def.name}</div>
        <div class="pc-meta">${def.type} · ★ ${def.rating} · ${def.fromFahaz}</div>
        <div class="suggest-note">${def.spec} · ${def.hours}</div>
      </div>
    </div>`;
  }

  return html;
}

function renderPlanner(){
  const row = document.getElementById('daysRow');
  row.innerHTML = '';
  days.forEach((day,di)=>{
    const st = calcStats(day.items, day.arrival);
    const col = document.createElement('div');
    col.className='day-col';
    col.id='col-'+day.id;

    const itemsHtml = day.items.map((it,idx)=>{
      const data=getItem(it.type,it.id);
      if(!data) return '';
      const isEat=it.type==='eat';
      const tag = it.type==='tura'?'túra':it.type==='eat'?'étkezés':'program';
      const tagC = it.type==='tura'?'t':it.type==='eat'?'e':'o';
      const meta = it.type==='tura'
        ? `${data.distL} km · ${data.elev} m szint · ${data.time} · ${data.diff} · ${data.fit} · 🏠 ${data.fromFahaz}`
        : it.type==='eat'
        ? `★ ${data.rating} (${data.cnt}) · ${data.spec} · ${data.hours} · 🏠 ${data.fromFahaz}`
        : `${data.desc} · ${data.mikor||''} · 🏠 ${data.fromFahaz}`;
      return `<div class="pcard${isEat?' eat-p':''}" draggable="true"
        ondragstart="placedDragStart(event,'${day.id}',${idx})"
        ondragend="dragEnd(event)">
        <span class="pc-icon">${data.icon||'📌'}</span>
        <div class="pc-body">
          <div class="pc-name">${data.name}</div>
          <div class="pc-meta">${meta}</div>
          <span class="pc-tag pct-${tagC}">${tag}</span>
        </div>
        <button class="pc-x" onclick="removeIt('${day.id}',${idx})" title="Eltávolítás">×</button>
      </div>`;
    }).join('');

    const autoHtml = autoMealCards(day.items, day.arrival||false);
    const isEmpty = day.items.length===0;

    col.innerHTML=`
      <div class="day-head">
        <div class="day-head-top">
          <span class="day-n">${di+1}. nap</span>
        </div>
        <input class="day-title-input" value="${day.name}" onchange="renameDay('${day.id}',this.value)" placeholder="Nap neve...">
        <div class="day-stats-row">
          ${st.routes>0?`<span class="dstat">⛰ <strong>${st.km} km · ${st.elev} m</strong></span>`:'<span class="dstat" style="color:var(--border)">Nincs túra</span>'}
          ${st.turahours>0?`<span class="dstat">⏱ <strong>${st.turahours} ó program</strong></span>`:''}
          ${st.eats>0?`<span class="dstat">🍴 <strong>${st.eats}</strong> étterem</span>`:''}
        </div>
      </div>
      <div class="dropzone${isEmpty?' dropzone-has-empty':''}" id="dz-${day.id}"
        ondragover="dzOver(event,'${day.id}')"
        ondragleave="dzLeave(event,'${day.id}')"
        ondrop="dzDrop(event,'${day.id}')">
        ${isEmpty?'<div class="dropzone-empty">Húzz ide elemet a könyvtárból</div>':''}
        ${autoHtml}${itemsHtml}
      </div>
      <div class="day-foot">
        <span class="foot-stat">${day.items.length} elem</span>
        ${st.turahours>0?`<span class="foot-stat">⏱ Programok összesen: <strong>${st.turahours} ó</strong></span>`:''}
        ${day.items.length>0?`<button class="tbtn tbtn-ghost" style="font-size:13px;padding:4px 10px;background:none;color:var(--muted);border-color:var(--border)" onclick="clearDay('${day.id}')">Nap törlése</button>`:''}
      </div>`;

    row.appendChild(col);
  });



  // update counter
  const total = days.reduce((s,d)=>s+d.items.length,0);
  document.getElementById('totalCounter').textContent = total + ' elem tervezve';
}

/* ════════════════════════════════════════
   DRAG & DROP
════════════════════════════════════════ */
function libDragStart(e, type, id){
  dragging = {type, id, fromDay:null, fromIdx:-1};
  e.dataTransfer.effectAllowed='copy';
  e.currentTarget.classList.add('is-dragging');
}

function placedDragStart(e, dayId, idx){
  const day=days.find(d=>d.id===dayId);
  dragging={...day.items[idx], fromDay:dayId, fromIdx:idx};
  e.dataTransfer.effectAllowed='move';
  e.currentTarget.classList.add('is-dragging');
  e.stopPropagation();
}

function dragEnd(e){
  e.currentTarget.classList.remove('is-dragging');
  document.querySelectorAll('.dropzone').forEach(z=>z.classList.remove('over'));
  document.querySelectorAll('.day-col').forEach(c=>c.classList.remove('accepting'));
}

function dzOver(e, dayId){
  e.preventDefault();
  e.dataTransfer.dropEffect = dragging?.fromDay ? 'move':'copy';
  document.getElementById('dz-'+dayId).classList.add('over');
  document.getElementById('col-'+dayId).classList.add('accepting');
}

function dzLeave(e, dayId){
  if(!e.currentTarget.contains(e.relatedTarget)){
    document.getElementById('dz-'+dayId).classList.remove('over');
    document.getElementById('col-'+dayId).classList.remove('accepting');
  }
}

function dzDrop(e, dayId){
  e.preventDefault();
  document.getElementById('dz-'+dayId).classList.remove('over');
  document.getElementById('col-'+dayId).classList.remove('accepting');
  if(!dragging) return;
  const target = days.find(d=>d.id===dayId);
  if(dragging.fromDay){
    const src=days.find(d=>d.id===dragging.fromDay);
    const [moved]=src.items.splice(dragging.fromIdx,1);
    target.items.push(moved);
  } else {
    // prevent duplicate per day
    if(target.items.some(i=>i.id===dragging.id && i.type===dragging.type)){
      showToast('Ez az elem már ezen a napon van!');
      dragging=null; return;
    }
    target.items.push({type:dragging.type, id:dragging.id});
  }
  dragging=null;
  renderPlanner();
  showToast('✓ Hozzáadva');
}

/* ════════════════════════════════════════
   ACTIONS
════════════════════════════════════════ */
function removeIt(dayId,idx){
  days.find(d=>d.id===dayId).items.splice(idx,1);
  renderPlanner();
}
function clearDay(dayId){
  days.find(d=>d.id===dayId).items=[];
  renderPlanner();
}
function renameDay(dayId,val){
  days.find(d=>d.id===dayId).name=val;
  renderPlanner();
}
function addDay(){
  const n=days.length+1;
  days.push({id:'d'+Date.now(),name:`${n}. nap`,items:[]});
  renderPlanner();
  setTimeout(()=>document.querySelector('.days-row').scrollLeft=99999,50);
}
function clearAll(){
  if(!confirm('Törlöd az összes elemet?')) return;
  days=[{id:'d1',name:'Érkezés',arrival:true,items:[]},{id:'d2',name:'2. nap',items:[]},{id:'d3',name:'3. nap',items:[]},{id:'d4',name:'Hazaút',items:[]}];
  renderPlanner();
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}
