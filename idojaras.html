<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Időjárás előrejelzés</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #eef2f7;
  color: #1a202c;
  padding: 2rem;
  text-align: center;
}
.card {
  background: #fff;
  border-radius: 14px;
  border: 2px solid #cbd5e0;
  padding: 2rem;
  max-width: 500px;
  margin: 2rem auto;
  box-shadow: 0 2px 8px rgba(0,0,0,.06);
}
.icon { font-size: 3rem; margin-bottom: 1rem; }
h1 { font-size: 1.2rem; color: #2d3748; margin-bottom: .5rem; }
p { font-size: .9rem; color: #718096; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">🌤️</div>
  <h1>Előrejelzés hamarosan</h1>
  <p>Az időjárás-bot naponta frissíti ezt az oldalt.<br>
  Noszvaj & Bélapátfalva · Open-Meteo + AI narráció</p>
</div>
<script>
// Magasság küldése a szülő oldalnak
function sendHeight() {
  var h = document.body.scrollHeight;
  window.parent.postMessage({type:'iframeHeight', height: h}, '*');
}
window.addEventListener('load', function() {
  sendHeight();
  // Újraküldés kép/font betöltés után
  setTimeout(sendHeight, 800);
  setTimeout(sendHeight, 2000);
});
window.addEventListener('message', function(e) {
  if (e.data === 'getHeight') sendHeight();
});
</script>
</body>
</html>
